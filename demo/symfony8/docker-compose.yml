name: audit-kit-demo-symfony8

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audit-kit-demo-symfony8-php
    working_dir: /app
    ports:
      - "${PORT:-8013}:80"
    volumes:
      - .:/app
      - ../..:/var/audit-kit-bundle
      - ./docker/frankenphp/Caddyfile.dev:/etc/frankenphp/Caddyfile.dev
      - ./docker/php-dev.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
      - composer-cache:/root/.composer/cache
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - APP_ENV=dev
      - APP_DEBUG=1
      - APP_SECRET=${APP_SECRET:-demo-secret}
    # Public DNS for Composer / Packagist (Docker/WSL resolver failures)
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - audit-kit-demo-network

volumes:
  composer-cache:
    driver: local

networks:
  audit-kit-demo-network:
    driver: bridge
