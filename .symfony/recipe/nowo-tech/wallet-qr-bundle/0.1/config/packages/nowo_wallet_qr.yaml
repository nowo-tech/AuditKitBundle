nowo_wallet_qr:
    google_wallet:
        enabled: false
        issuer_id: '%env(GOOGLE_WALLET_ISSUER_ID)%'
        service_account_json: '%kernel.project_dir%/config/google-wallet-service-account.json'
        origins: []
    apple_wallet:
        enabled: false
        pass_download_url_pattern: 'https://example.com/wallet/{pass_id}.pkpass'
    qr_code:
        size: 300
        margin: 10
        error_correction: high
        url_allowlist: []
